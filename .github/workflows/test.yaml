name: Tests

on: [ push, pull_request ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-22.04

    strategy:
      matrix:
        node-version: [ 22.x, 24.x ]
        typescript-version: [ 5.5, 5.8, 5.9 ]

    steps:
      - name: Using branch ${{ github.ref }} for repository ${{ github.repository }}.
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install specific TS
        run: npm i -g typescript@${{ matrix.typescript-version }}

      - name: Check TypeScript version
        run: tsc --version

      - name: Cache dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: .yarn
          key: ${{ runner.OS }}-node-${{ matrix.node-version }}-typescript-${{ matrix.typescript-version }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.OS }}-node-${{ matrix.node-version }}-typescript-${{ matrix.typescript-version }}-yarn-

      - name: Install dependencies
        run: yarn install

      - name: Checking for peer dependency conflicts
        run: yarn check:peer-deps:fix

      - name: Generating declarations for type testing
        run: yarn generate:test-fixtures

      - name: Run type tests
        run: yarn test:types

      - name: Run unit tests
        if: matrix.node-version != '24.x' || matrix.typescript-version != '5.9'
        run: yarn test:units

      - name: Run coverage
        if: matrix.node-version == '24.x' && matrix.typescript-version == '5.9'
        run: yarn test:coverage

      - name: Upload coverage to GitHub Artifacts
        if: matrix.node-version == '24.x' && matrix.typescript-version == '5.9'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.node-version }}-ts-${{ matrix.typescript-version }}
          path: coverage/
          retention-days: 30

      - name: Upload coverage reports to Codecov
        if: matrix.node-version == '24.x' && matrix.typescript-version == '5.9'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          disable_search: true
          fail_ci_if_error: true
          verbose: true
