name: Tests

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        node-version: [ 22.x, 24.x ]
        typescript-version: [ 5.5, 5.8, 5.9 ]

    steps:
      - name: Using branch ${{ github.ref }} for repository ${{ github.repository }}.
        uses: actions/checkout@v6

      - name: Setup Node.js and dependencies
        uses: ./.github/actions/setup-node-deps
        with:
          node-version: ${{ matrix.node-version }}
          cache-key-suffix: tests-typescript-${{ matrix.typescript-version }}

      - name: Install specific TS
        run: npm i -g typescript@${{ matrix.typescript-version }}

      - name: Check TypeScript version
        run: tsc --version

      - name: Checking for peer dependency conflicts
        run: yarn check:peer-deps:fix

      - name: Generating declarations for type testing
        run: yarn generate:test-fixtures

      - name: Run type tests
        run: yarn test:types

      - name: Run unit tests
        run: yarn test:units
