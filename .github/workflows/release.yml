name: Release

on:
  workflow_dispatch:
    inputs:
      release:
        description: "Release type"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
      prerelease:
        description: "Prerelease channel"
        required: true
        default: "none"
        type: choice
        options:
          - none
          - alpha
          - beta
          - rc
      npm_tag:
        description: "npm dist-tag for publication"
        required: true
        default: "latest"
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-publish-auth:
    name: Detect publish auth
    runs-on: ubuntu-24.04

    outputs:
      has-npm-token: ${{ steps.detect.outputs.has-npm-token }}

    steps:
      - name: Detect npm token
        id: detect
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            echo "has-npm-token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-npm-token=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    runs-on: ubuntu-24.04

    permissions:
      contents: write

    outputs:
      release_tag: ${{ steps.release_meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate release branch and npm tag
        env:
          NPM_TAG: ${{ inputs.npm_tag }}
        run: |
          if [ "$NPM_TAG" = "latest" ] && [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "Release to npm tag 'latest' must be started from the main branch."
            exit 1
          fi

      - name: Setup Node.js and dependencies
        uses: ./.github/actions/setup-node-deps
        with:
          node-version: 24.15
          cache-key-suffix: release
          registry-url: https://registry.npmjs.org

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run release script
        env:
          RELEASE_TYPE: ${{ inputs.release }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          case "$RELEASE_TYPE" in
            auto)
              RELEASE_SCRIPT="release"
              ;;
            patch)
              RELEASE_SCRIPT="release:patch"
              ;;
            minor)
              RELEASE_SCRIPT="release:minor"
              ;;
            major)
              RELEASE_SCRIPT="release:major"
              ;;
            *)
              echo "Unknown release type: $RELEASE_TYPE"
              exit 1
              ;;
          esac

          CMD=(yarn run "$RELEASE_SCRIPT")
          if [ "$PRERELEASE" != "none" ]; then
            CMD+=(--prerelease "$PRERELEASE")
          fi

          "${CMD[@]}"

      - name: Resolve release metadata
        id: release_meta
        run: |
          version="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Push release commit and tags
        run: git push origin "HEAD:${GITHUB_REF_NAME}" --follow-tags

  publish-token:
    name: Publish to npm with token
    runs-on: ubuntu-24.04
    needs: [detect-publish-auth, release]
    if: ${{ needs.detect-publish-auth.outputs.has-npm-token == 'true' }}

    permissions:
      contents: read

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ needs.release.outputs.release_tag }}

      - name: Setup Node.js and dependencies
        uses: ./.github/actions/setup-node-deps
        with:
          node-version: 24.15
          cache-key-suffix: release-publish-token
          registry-url: https://registry.npmjs.org

      - name: Build package
        run: yarn build

      - name: Check npm package version
        id: npm_version
        shell: bash
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --silent >/dev/null 2>&1; then
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is already published; skipping npm publish."
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm with token
        if: ${{ steps.npm_version.outputs.published == 'false' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TAG: ${{ inputs.npm_tag }}
        run: npm publish --access public --tag "$NPM_TAG"

  publish-trusted:
    name: Publish to npm with trusted publishing
    runs-on: ubuntu-24.04
    needs: [detect-publish-auth, release]
    if: ${{ needs.detect-publish-auth.outputs.has-npm-token == 'false' }}

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ needs.release.outputs.release_tag }}

      - name: Setup Node.js and dependencies
        uses: ./.github/actions/setup-node-deps
        with:
          node-version: 24.15
          cache-key-suffix: release-publish-trusted
          registry-url: https://registry.npmjs.org

      - name: Build package
        run: yarn build

      - name: Check npm package version
        id: npm_version
        shell: bash
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --silent >/dev/null 2>&1; then
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is already published; skipping npm publish."
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm with trusted publishing
        if: ${{ steps.npm_version.outputs.published == 'false' }}
        env:
          NPM_TAG: ${{ inputs.npm_tag }}
        run: npm publish --access public --tag "$NPM_TAG"
